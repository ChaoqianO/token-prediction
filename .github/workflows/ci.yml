name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }} quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,data,estimators]"
      - name: Scan repository-intended files for secrets
        run: python scripts/scan_secrets.py
      - name: Verify tracked production baseline lock and frozen Git objects
        run: python scripts/verify_data_foundation_prediction_lock.py --tracked-only
      - name: Ruff lint
        run: python -m ruff check src tests scripts
      - name: Target schema and prefix-causality contracts
        run: |
          python -m pytest -q \
            tests/test_contracts.py \
            tests/test_config.py \
            tests/test_features.py \
            tests/test_trajectory.py \
            tests/test_bagen_swebench_reader.py::BagenSwebenchReaderTests::test_future_usage_changes_labels_and_post_response_audit_not_prefix_features \
            tests/test_bagen_swebench_reader.py::BagenSwebenchReaderTests::test_unknown_schema_fails_closed \
            tests/test_openhands_trajectory_reader.py::OpenHandsTrajectoryReaderTests::test_future_suffix_does_not_change_shared_prefix_features \
            tests/test_openhands_trajectory_reader.py::OpenHandsTrajectoryReaderTests::test_future_task_log_does_not_change_task_start_point \
            tests/test_openhands_trajectory_reader.py::OpenHandsTrajectoryReaderTests::test_unknown_completion_schema_fails_closed \
            tests/test_openhands_trajectory_reader.py::OpenHandsTrajectoryReaderTests::test_unknown_output_jsonl_schema_fails_closed
      - name: Target synthetic artifact and bundle parity
        run: |
          python -m pytest -q \
            tests/test_verify_data_foundation_baseline.py \
            tests/test_run_data_foundation_baseline.py \
            tests/test_verify_data_foundation_prediction_lock.py \
            tests/test_lineage.py \
            tests/test_lightgbm_bundle.py::LightGBMBundleTests::test_round_trip_predictions_are_exact_and_scope_is_preserved \
            tests/test_pipeline_prediction.py::PredictionPipelineSmokeTests::test_lightgbm_fold_audit_artifacts_and_runtime_versions_are_published
      - name: Run full pytest suite
        run: python -m pytest -q
      - name: Run unittest discovery
        run: python -m unittest discover -s tests -v

  distribution:
    name: Python ${{ matrix.python-version }} wheel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          python -m build --wheel
      - name: Inspect wheel contents and RECORD
        run: python scripts/check_distribution.py dist/*.whl
      - name: Install wheel into a clean environment
        run: |
          wheel_env="$RUNNER_TEMP/token-prediction-wheel-${{ matrix.python-version }}"
          python -m venv "$wheel_env"
          "$wheel_env/bin/python" -m pip install --no-deps dist/*.whl
          "$wheel_env/bin/python" -c "import importlib.metadata, token_prediction; assert importlib.metadata.version('token-prediction') == token_prediction.__version__"
          "$wheel_env/bin/python" -m token_prediction.cli --help
